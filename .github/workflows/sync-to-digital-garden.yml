name: Sync to Digital Garden

on:
  push:
    branches: [ main ]  # 当你推送到 main 分支时触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Obsidian Notes
        uses: actions/checkout@v3
        with:
          path: notes

      - name: Checkout Digital Garden Repo
        uses: actions/checkout@v3
        with:
          repository: MingQi39/my-digital-garden  # 你的数字花园仓库
          token: ${{ secrets.DG_REPO_TOKEN }}  # 数字花园仓库访问令牌
          path: blog

      - name: Copy notes to digital garden
        run: |
          # 清空数字花园的笔记目录
          rm -rf blog/src/site/notes/*
          # 复制 Obsidian 笔记到数字花园（排除 Obsidian 专用文件）
          shopt -s extglob
          cp -r notes/!(.obsidian|.claude|.DS_Store) blog/src/site/notes/

      - name: Commit and Push
        run: |
          cd blog
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto sync notes from my-notes to digital garden"
          git push
          git push
