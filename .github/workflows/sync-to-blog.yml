name: Sync to Blog

on:
  push:
    branches: [ main ]  # 当你推送到 main 分支时触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Obsidian Notes
        uses: actions/checkout@v3
        with:
          path: notes

      - name: Checkout Blog Repo
        uses: actions/checkout@v3
        with:
          repository: MingQi39/my-digital-garden  # 你的博客仓库
          token: ${{ secrets.BLOG_REPO_TOKEN }}  # 需要设置 token
          path: blog

      - name: Copy notes to blog
        run: |
          # 清空博客的笔记目录（假设你的笔记存在 content 文件夹）
          rm -rf blog/content/*
          # 复制 Obsidian 笔记到博客（排除 .git 等）
          cp -r notes/* blog/content/

      - name: Commit and Push
        run: |
          cd blog
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto sync notes from obsidian-notes"
          git push
